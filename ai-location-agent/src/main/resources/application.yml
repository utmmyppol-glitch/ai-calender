spring:
  application:
    name: ai-location-agent

  datasource:
    url: jdbc:mysql://localhost:3306/location_agent?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-for-jwt-authentication-minimum-256-bits}

server:
  port: 8081
