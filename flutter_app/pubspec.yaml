name: ai_location_app
description: AI Location Agent — 위치 기반 스마트 일정 관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.1
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  stomp_dart_client: ^2.0.0
  web_socket_channel: ^3.0.0
  flutter_local_notifications: ^17.2.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
